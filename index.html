<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星空连线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      touch-action: none;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }
    .hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      animation: pulse 3s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    .stats {
      position: absolute;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="hint">✨ 点击屏幕创造星星，拖动连接它们</div>
  <div class="stats">星星: <span id="starCount">0</span></div>

  <script>
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const stars = []
    const lines = []

    let width, height
    let lastTouchX, lastTouchY
    let isDrawing = false

    function resize() {
      width = window.innerWidth
      height = window.innerHeight
      canvas.width = width
      canvas.height = height
      initStars()
    }

    function initStars() {
      stars.length = 0
      lines.length = 0
      const count = Math.floor((width * height) / 15000)
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 2 + 0.5,
          opacity: Math.random() * 0.5 + 0.2,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3
        })
      }
      document.getElementById('starCount').textContent = stars.length
    }

    function addStar(x, y) {
      stars.push({
        x, y,
        size: Math.random() * 3 + 1,
        opacity: 1,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        isNew: true
      })
      document.getElementById('starCount').textContent = stars.length
    }

    function connectStars(x1, y1, x2, y2) {
      let nearest1 = null, nearest2 = null
      let dist1 = Infinity, dist2 = Infinity

      stars.forEach(s => {
        const d1 = Math.hypot(s.x - x1, s.y - y1)
        const d2 = Math.hypot(s.x - x2, s.y - y2)
        if (d1 < dist1) { dist1 = d1; nearest1 = s }
        if (d2 < dist2) { dist2 = d2; nearest2 = s }
      })

      if (nearest1 && nearest2 && nearest1 !== nearest2 && dist1 < 80 && dist2 < 80) {
        lines.push({
          x1: nearest1.x, y1: nearest1.y,
          x2: nearest2.x, y2: nearest2.y,
          opacity: 0.6,
          life: 100
        })
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 26, 0.1)'
      ctx.fillRect(0, 0, width, height)

      stars.forEach(s => {
        s.x += s.vx
        s.y += s.vy

        if (s.x < 0) s.x = width
        if (s.x > width) s.x = 0
        if (s.y < 0) s.y = height
        if (s.y > height) s.y = 0

        if (s.isNew) {
          s.opacity = Math.min(1, s.opacity + 0.05)
          if (s.opacity >= 1) s.isNew = false
        }

        ctx.beginPath()
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2)
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`
        ctx.fill()

        ctx.beginPath()
        ctx.arc(s.x, s.y, s.size * 2, 0, Math.PI * 2)
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity * 0.3})`
        ctx.fill()
      })

      stars.forEach((s1, i) => {
        stars.slice(i + 1).forEach(s2 => {
          const dist = Math.hypot(s1.x - s2.x, s1.y - s2.y)
          if (dist < 100) {
            ctx.beginPath()
            ctx.moveTo(s1.x, s1.y)
            ctx.lineTo(s2.x, s2.y)
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 * (1 - dist / 100)})`
            ctx.lineWidth = 0.5
            ctx.stroke()
          }
        })
      })

      lines.forEach((l, i) => {
        l.life--
        if (l.life <= 0) {
          lines.splice(i, 1)
          return
        }

        ctx.beginPath()
        ctx.moveTo(l.x1, l.y1)
        ctx.lineTo(l.x2, l.y2)
        ctx.strokeStyle = `rgba(186, 137, 255, ${l.opacity * (l.life / 100)})`
        ctx.lineWidth = 1
        ctx.stroke()
      })

      requestAnimationFrame(animate)
    }

    canvas.addEventListener('pointerdown', (e) => {
      isDrawing = true
      lastTouchX = e.clientX
      lastTouchY = e.clientY
      addStar(e.clientX, e.clientY)
    })

    canvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return

      addStar(e.clientX, e.clientY)
      connectStars(lastTouchX, lastTouchY, e.clientX, e.clientY)

      lastTouchX = e.clientX
      lastTouchY = e.clientY
    })

    canvas.addEventListener('pointerup', () => {
      isDrawing = false
    })

    canvas.addEventListener('pointerleave', () => {
      isDrawing = false
    })

    window.addEventListener('resize', resize)
    resize()
    animate()
  </script>
</body>
</html>
